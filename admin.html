<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin | Ram Harikrishnan</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-card: #1a1a1a;
            --accent-primary: #00d4ff; --accent-secondary: #7c3aed;
            --text-primary: #ffffff; --text-secondary: #a0a0a0; --border-color: #2a2a2a;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 2rem; }

        nav { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 1000px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
        .nav-title { color: var(--accent-secondary); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Login */
        .login-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .login-box { background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); border-radius: 20px; border: 1px solid var(--border-color); width: 100%; max-width: 440px; padding: 3rem; position: relative; overflow: hidden; }
        .login-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); }
        .login-box h2 { font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 0.8rem 1rem; font-family: inherit; font-size: 1rem;
            background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border-color);
            border-radius: 8px; outline: none; transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        .form-group textarea { min-height: 400px; resize: vertical; line-height: 1.7; }

        .btn { padding: 0.8rem 2rem; border-radius: 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s ease; border: none; display: inline-block; text-decoration: none; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: var(--text-primary); }
        .btn-primary:hover { box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3); }
        .btn-secondary { background: transparent; color: var(--text-primary); border: 2px solid var(--accent-primary); }
        .btn-secondary:hover { background: var(--accent-primary); }
        .btn-ghost { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-ghost:hover { border-color: var(--accent-primary); color: var(--text-primary); }
        .btn-full { width: 100%; text-align: center; }
        .btn-logout { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 0.5rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .btn-logout:hover { border-color: #e53e3e; color: #e53e3e; }

        .error-msg { color: #fc8181; font-size: 0.9rem; text-align: center; margin-top: 1rem; display: none; }

        /* Admin */
        .admin-panel { display: none; padding: 3rem 0; }
        .admin-panel.active { display: block; }
        .panel-header { text-align: center; margin-bottom: 3rem; }
        .panel-header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .editor-card { background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); border-radius: 20px; padding: 2.5rem; border: 1px solid var(--border-color); margin-bottom: 2.5rem; position: relative; overflow: hidden; }
        .editor-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); }
        .editor-card h3 { font-size: 1.2rem; font-weight: 700; color: var(--accent-primary); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

        /* Toolbar */
        .toolbar { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; padding: 0.6rem; background: var(--bg-primary); border-radius: 8px 8px 0 0; border: 1px solid var(--border-color); border-bottom: none; }
        .toolbar button { font-family: inherit; font-size: 0.85rem; padding: 0.3rem 0.7rem; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
        .toolbar button:hover { background: var(--accent-primary); color: var(--text-primary); border-color: var(--accent-primary); }

        /* Tabs */
        .tabs { display: flex; gap: 0; margin-top: 1.5rem; }
        .tab { padding: 0.6rem 1.5rem; font-size: 0.85rem; font-weight: 600; border: 1px solid var(--border-color); border-bottom: none; background: var(--bg-primary); color: var(--text-secondary); cursor: pointer; transition: all 0.2s; border-radius: 8px 8px 0 0; }
        .tab.active { background: var(--bg-card); color: var(--accent-primary); border-color: var(--accent-primary); border-bottom-color: var(--bg-card); }
        .tab-content { border: 1px solid var(--border-color); border-radius: 0 8px 8px 8px; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .tab-content textarea { border-radius: 0 0 8px 8px; border: none; border-top: none; }

        /* Preview */
        .preview-area { min-height: 200px; padding: 2rem; background: var(--bg-card); color: var(--text-secondary); font-size: 1.05rem; line-height: 1.8; }
        .preview-area h1, .preview-area h2, .preview-area h3 { color: var(--text-primary); margin: 1.5rem 0 1rem; font-weight: 700; }
        .preview-area h1 { font-size: 1.5rem; } .preview-area h2 { font-size: 1.3rem; } .preview-area h3 { font-size: 1.1rem; color: var(--accent-primary); }
        .preview-area p { margin-bottom: 1rem; }
        .preview-area ul, .preview-area ol { margin: 1rem 0 1rem 2rem; }
        .preview-area code { background: rgba(0, 212, 255, 0.1); padding: 0.15rem 0.4rem; border-radius: 4px; color: var(--accent-primary); font-family: 'SF Mono', monospace; }
        .preview-area pre { background: #0d1117; color: #e6edf3; padding: 1.5rem; margin: 1.5rem 0; border-radius: 12px; overflow-x: auto; font-family: 'SF Mono', monospace; font-size: 0.9rem; }
        .preview-area blockquote { border-left: 4px solid var(--accent-primary); padding: 1rem 1.5rem; margin: 1.5rem 0; background: rgba(0, 212, 255, 0.05); border-radius: 0 8px 8px 0; }
        .preview-area strong { color: var(--text-primary); }

        .action-bar { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }

        /* Output */
        .output-textarea { min-height: 250px; font-family: 'SF Mono', monospace; font-size: 0.85rem; background: #0d1117; color: #e6edf3; border-color: #333; border-radius: 8px; }

        /* Toast */
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 0.8rem 1.5rem; font-family: inherit; font-size: 0.95rem; border-radius: 12px; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; border: 1px solid; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: rgba(72, 187, 120, 0.15); border-color: #48bb78; color: #48bb78; }
        .toast.error { background: rgba(252, 129, 129, 0.15); border-color: #fc8181; color: #fc8181; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .panel-header h1 { font-size: 1.5rem; }
            .action-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Authenticate</button>
                <p id="loginError" class="error-msg">Invalid password. Access denied.</p>
            </form>
        </div>
    </div>

    <!-- Admin -->
    <div id="adminPanel" class="admin-panel">
        <nav>
            <div class="nav-inner">
                <a href="index.html" class="logo">RH</a>
                <span class="nav-title">Blog Admin</span>
                <button class="btn-logout" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <div class="container">
            <div class="panel-header">
                <h1>New Blog Post</h1>
            </div>

            <div class="editor-card">
                <h3>Post Details</h3>
                <div class="form-group">
                    <label for="postTitle">Post Title</label>
                    <input type="text" id="postTitle" placeholder="Enter your post title...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="postSlug">URL Slug</label>
                        <input type="text" id="postSlug" placeholder="blog-my-post-title">
                    </div>
                    <div class="form-group">
                        <label for="postDate">Date</label>
                        <input type="date" id="postDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="postSubtitle">Subtitle / Description</label>
                        <input type="text" id="postSubtitle" placeholder="A brief description for the blog card...">
                    </div>
                    <div class="form-group">
                        <label for="postTags">Tags (comma separated)</label>
                        <input type="text" id="postTags" placeholder="Python, AI, Open Source">
                    </div>
                </div>
                <div class="form-group">
                    <label for="postBadges">Header Badges (comma separated)</label>
                    <input type="text" id="postBadges" placeholder="Blog Post, Open Source, Meta / PyTorch">
                </div>
            </div>

            <div class="editor-card">
                <h3>Content</h3>
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('write')">Write</div>
                    <div class="tab" onclick="switchTab('preview')">Preview</div>
                </div>
                <div class="tab-content">
                    <div id="writePane" class="tab-pane active">
                        <div class="toolbar">
                            <button type="button" onclick="insertMarkdown('**', '**')"><b>B</b></button>
                            <button type="button" onclick="insertMarkdown('*', '*')"><i>I</i></button>
                            <button type="button" onclick="insertMarkdown('`', '`')">Code</button>
                            <button type="button" onclick="insertMarkdown('\n```\n', '\n```\n')">Block</button>
                            <button type="button" onclick="insertMarkdown('## ', '')">H2</button>
                            <button type="button" onclick="insertMarkdown('### ', '')">H3</button>
                            <button type="button" onclick="insertMarkdown('- ', '')">List</button>
                            <button type="button" onclick="insertMarkdown('1. ', '')">OL</button>
                            <button type="button" onclick="insertMarkdown('> ', '')">Quote</button>
                            <button type="button" onclick="insertMarkdown('[', '](url)')">Link</button>
                        </div>
                        <textarea id="postContent" class="form-group" style="border-radius: 0 0 8px 8px; border-top: none;" placeholder="Write your post in Markdown...

## Introduction
Your opening paragraph here...

## Main Section
Content goes here. Use **bold** and *italic* for emphasis.

### Subsection
- Bullet points work too

```python
# Code blocks are supported
print('Hello, world!')
```
"></textarea>
                    </div>
                    <div id="previewPane" class="tab-pane">
                        <div id="previewArea" class="preview-area">
                            <p style="color: var(--text-secondary); opacity: 0.5;">Write some content and switch to Preview to see it rendered...</p>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-primary" onclick="generatePost()">Generate HTML</button>
                    <button class="btn btn-secondary" onclick="downloadPost()">Download .html</button>
                    <button class="btn btn-ghost" onclick="saveDraft()">Save Draft</button>
                    <button class="btn btn-ghost" onclick="loadDraft()">Load Draft</button>
                </div>
            </div>

            <div id="outputSection" class="editor-card" style="display: none;">
                <h3>Generated Output</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1rem;">Save as <code id="outputFilename" style="background: rgba(0,212,255,0.1); color: var(--accent-primary); padding: 0.15rem 0.5rem; border-radius: 4px;"></code> in your portfolio folder. Then paste the card snippet into <code style="background: rgba(0,212,255,0.1); color: var(--accent-primary); padding: 0.15rem 0.5rem; border-radius: 4px;">index.html</code>.</p>
                <div class="form-group">
                    <label>Blog Post HTML</label>
                    <textarea id="outputHtml" class="output-textarea"></textarea>
                </div>
                <button class="btn btn-ghost" onclick="copyOutput()" style="margin-bottom: 2rem;">Copy HTML to Clipboard</button>
                <div class="form-group">
                    <label>Index.html Blog Card Snippet</label>
                    <textarea id="outputCardHtml" class="output-textarea" style="min-height: 120px;"></textarea>
                </div>
                <button class="btn btn-ghost" onclick="copyCardSnippet()">Copy Card Snippet</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
    const ADMIN_KEY = 'cmFtYWRtaW4yMDI1';

    function handleLogin(e) {
        e.preventDefault();
        if (btoa(document.getElementById('password').value) === ADMIN_KEY) {
            sessionStorage.setItem('blog_admin_auth', 'true');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('loginError').style.display = 'none';
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('password').value = '';
        }
        return false;
    }

    function handleLogout() {
        sessionStorage.removeItem('blog_admin_auth');
        document.getElementById('adminPanel').classList.remove('active');
        document.getElementById('loginScreen').style.display = 'flex';
    }

    if (sessionStorage.getItem('blog_admin_auth') === 'true') {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').classList.add('active');
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        if (tab === 'write') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('writePane').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('previewPane').classList.add('active');
            document.getElementById('previewArea').innerHTML = parseMarkdown(document.getElementById('postContent').value) || '<p style="opacity:0.5">Nothing to preview...</p>';
        }
    }

    function insertMarkdown(before, after) {
        const ta = document.getElementById('postContent');
        const start = ta.selectionStart, end = ta.selectionEnd;
        const selected = ta.value.substring(start, end) || 'text';
        ta.value = ta.value.substring(0, start) + before + selected + after + ta.value.substring(end);
        ta.focus();
        ta.selectionStart = start + before.length;
        ta.selectionEnd = start + before.length + selected.length;
    }

    function parseMarkdown(md) {
        let html = md;
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => '<pre><code>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</code></pre>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
        html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        html = html.split('\n\n').map(b => {
            b = b.trim();
            if (!b || b.startsWith('<h') || b.startsWith('<ul') || b.startsWith('<ol') || b.startsWith('<pre') || b.startsWith('<blockquote') || b.startsWith('<li')) return b;
            return '<p>' + b.replace(/\n/g, '<br>') + '</p>';
        }).join('\n');
        return html;
    }

    document.getElementById('postTitle').addEventListener('input', function() {
        document.getElementById('postSlug').value = 'blog-' + this.value.toLowerCase().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    });
    document.getElementById('postDate').valueAsDate = new Date();

    function generatePost() {
        const title = document.getElementById('postTitle').value;
        const subtitle = document.getElementById('postSubtitle').value;
        const slug = document.getElementById('postSlug').value;
        const date = document.getElementById('postDate').value;
        const tags = document.getElementById('postTags').value;
        const badges = document.getElementById('postBadges').value || 'Blog Post';
        const content = document.getElementById('postContent').value;
        if (!title || !content) { showToast('Title and content are required!', 'error'); return; }

        const parsed = parseMarkdown(content);
        const sections = [];
        const parts = parsed.split(/<h2>(.*?)<\/h2>/);
        if (parts[0].trim()) sections.push({ title: null, content: parts[0] });
        for (let i = 1; i < parts.length; i += 2) sections.push({ title: parts[i], content: parts[i + 1] || '' });
        if (!sections.length) sections.push({ title: null, content: parsed });

        const badgesHtml = badges.split(',').map(b => `                <span class="badge">${b.trim()}</span>`).join('\n');
        const sectionsHtml = sections.map(s => `
            <div class="content-section">
                ${s.title ? '<h2>' + s.title + '</h2>' : ''}
                ${s.content}
            </div>`).join('\n');
        const displayDate = new Date(date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        const fullHtml = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} | Ram Harikrishnan</title>
    <meta name="description" content="${subtitle}">
    <meta property="og:type" content="article">
    <meta property="og:title" content="${title}">
    <meta property="og:url" content="https://ramharikrishnan.dev/${slug}.html">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-card: #1a1a1a; --accent-primary: #00d4ff; --accent-secondary: #7c3aed; --text-primary: #ffffff; --text-secondary: #a0a0a0; --border-color: #2a2a2a; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; padding: 0 2rem; }
        a { color: var(--accent-primary); text-decoration: none; } a:hover { color: var(--accent-secondary); }
        nav { position: sticky; top: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border-color); }
        .nav-inner { max-width: 900px; margin: 0 auto; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
        .back-link { color: var(--text-secondary); font-weight: 500; } .back-link:hover { color: var(--accent-primary); }
        .article-hero { padding: 5rem 0 3rem; text-align: center; position: relative; }
        .article-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 30% 50%, rgba(0,212,255,0.06) 0%, transparent 50%), radial-gradient(circle at 70% 80%, rgba(124,58,237,0.06) 0%, transparent 50%); pointer-events: none; }
        .article-badges { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
        .badge { display: inline-block; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; padding: 0.4rem 1.2rem; border-radius: 50px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .article-title { font-size: 2.8rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .article-subtitle { font-size: 1.2rem; color: var(--text-secondary); max-width: 700px; margin: 0 auto; line-height: 1.8; }
        .article-content { padding: 2rem 0 6rem; }
        .content-section { background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary)); border-radius: 20px; padding: 3rem; border: 1px solid var(--border-color); margin-bottom: 2.5rem; position: relative; overflow: hidden; }
        .content-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); }
        .content-section h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 1.5rem; }
        .content-section h3 { font-size: 1.3rem; font-weight: 700; margin: 2rem 0 1rem; color: var(--accent-primary); }
        .content-section p { font-size: 1.1rem; color: var(--text-secondary); line-height: 1.9; margin-bottom: 1.2rem; }
        .content-section ul, .content-section ol { margin: 1rem 0 1.5rem 1.5rem; list-style: none; }
        .content-section li { color: var(--text-secondary); margin-bottom: 0.8rem; padding-left: 1.5rem; position: relative; font-size: 1.1rem; line-height: 1.8; }
        .content-section li::before { content: '▹'; position: absolute; left: 0; color: var(--accent-primary); }
        .content-section strong { color: var(--text-primary); }
        .content-section code { font-family: 'SF Mono', monospace; background: rgba(0,212,255,0.1); padding: 0.15rem 0.4rem; border-radius: 4px; color: var(--accent-primary); }
        .content-section pre { background: #0d1117; color: #e6edf3; padding: 1.5rem; margin: 1.5rem 0; border-radius: 12px; overflow-x: auto; font-family: 'SF Mono', monospace; font-size: 0.9rem; }
        .content-section blockquote { border-left: 4px solid var(--accent-primary); padding: 1rem 1.5rem; margin: 1.5rem 0; background: rgba(0,212,255,0.05); border-radius: 0 12px 12px 0; }
        footer { text-align: center; padding: 3rem 2rem; color: var(--text-secondary); border-top: 1px solid var(--border-color); }
        footer a { color: var(--accent-primary); }
        @media (max-width: 768px) { .article-title { font-size: 2rem; } .content-section { padding: 2rem; } }
    </style>
</head>

    <div class="container">
        <div class="article-hero">
            <div class="article-badges">
${badgesHtml}
            </div>
            <h1 class="article-title">${title}</h1>
            <p class="article-subtitle">${subtitle}</p>
        </div>
        <div class="article-content">
${sectionsHtml}
        </div>
    </div>
    <footer><div class="container"><p>&copy; ${new Date().getFullYear()} Ram Harikrishnan. <a href="index.html">Back to Portfolio</a></p></div></footer>

        document.getElementById('outputSection').style.display = 'block';
        document.getElementById('outputHtml').value = fullHtml;
        document.getElementById('outputFilename').textContent = slug + '.html';

        const tagsHtml = tags ? tags.split(',').map(t => `                        <span class="tech-tag">${t.trim()}</span>`).join('\n') : '';
        document.getElementById('outputCardHtml').value = `                <a href="${slug}.html" class="blog-card">
                    <div class="blog-date">${displayDate}</div>
                    <h3>${title}</h3>
                    <p>${subtitle}</p>
                    <div class="tech-tags" style="margin-bottom: 1.5rem;">
${tagsHtml}
                    </div>
                    <span class="blog-read-more">Read More →</span>
                </a>`;

        document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
        showToast('Blog post HTML generated!', 'success');
    }

    function downloadPost() {
        const html = document.getElementById('outputHtml').value;
        const slug = document.getElementById('postSlug').value || 'blog-post';
        if (!html) { showToast('Generate HTML first!', 'error'); return; }
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
        a.download = slug + '.html';
        a.click();
        showToast('Downloaded ' + slug + '.html', 'success');
    }

    function saveDraft() {
        localStorage.setItem('blog_draft', JSON.stringify({
            title: document.getElementById('postTitle').value, subtitle: document.getElementById('postSubtitle').value,
            slug: document.getElementById('postSlug').value, date: document.getElementById('postDate').value,
            tags: document.getElementById('postTags').value, badges: document.getElementById('postBadges').value,
            content: document.getElementById('postContent').value
        }));
        showToast('Draft saved!', 'success');
    }

    function loadDraft() {
        const saved = localStorage.getItem('blog_draft');
        if (!saved) { showToast('No saved draft found.', 'error'); return; }
        const d = JSON.parse(saved);
        ['postTitle','postSubtitle','postSlug','postDate','postTags','postBadges','postContent'].forEach(id => {
            const key = id.replace('post', '').toLowerCase();
            document.getElementById(id).value = d[key] || d[id.replace('post', '').charAt(0).toLowerCase() + id.replace('post', '').slice(1)] || '';
        });
        document.getElementById('postTitle').value = d.title || '';
        document.getElementById('postSubtitle').value = d.subtitle || '';
        document.getElementById('postSlug').value = d.slug || '';
        document.getElementById('postDate').value = d.date || '';
        document.getElementById('postTags').value = d.tags || '';
        document.getElementById('postBadges').value = d.badges || '';
        document.getElementById('postContent').value = d.content || '';
        showToast('Draft loaded!', 'success');
    }

    function copyOutput() { navigator.clipboard.writeText(document.getElementById('outputHtml').value); showToast('Copied!', 'success'); }
    function copyCardSnippet() { navigator.clipboard.writeText(document.getElementById('outputCardHtml').value); showToast('Copied!', 'success'); }

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    </script>
</body>
